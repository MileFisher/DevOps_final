name: CI

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: node/app/package-lock.json

      - name: Install dependencies
        working-directory: node/app
        run: npm ci

      - name: Lint
        working-directory: node/app
        run: npm run lint

      - name: Verify app syntax
        working-directory: node/app
        run: node --check main.js

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'node/app'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          ignore-unfixed: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image locally
        uses: docker/build-push-action@v5
        with:
          context: ./node
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devops-final:sha-${{ github.sha }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_USERNAME }}/devops-final:sha-${{ github.sha }}'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          ignore-unfixed: true

      - name: Push scanned image
        run: docker push "${{ secrets.DOCKER_USERNAME }}/devops-final:sha-${{ github.sha }}"
