name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── 2. Set up Node.js with dependency caching ───
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: node/app/package-lock.json

      # ─── 3. Install dependencies ───
      - name: Install dependencies
        working-directory: node/app
        run: npm ci

      # ─── 4. Lint ───
      - name: Lint
        working-directory: node/app
        run: npm run lint

      # ─── 5. Syntax check (Node has no compile step) ───
      - name: Verify app syntax
        working-directory: node/app
        run: node --check main.js

      # ─── 6. Trivy filesystem scan ───
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'node/app'
          exit-code: '1'
          severity: 'CRITICAL'
          format: 'table'
          ignore-unfixed: true

      # ─── 7. Docker build & push ───
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./node
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devops-final:v-${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/devops-final:latest

      # ─── 8. Trivy image scan ───
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_USERNAME }}/devops-final:v-${{ github.run_number }}'
          exit-code: '1'
          severity: 'CRITICAL'
          format: 'table'
          ignore-unfixed: true