name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  ansible-setup:
    name: Setup Servers with Ansible
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-pip
          pipx inject ansible-core boto3 botocore
          ansible-galaxy collection install community.docker amazon.aws

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-2

      - name: Create SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_KEY }}" > ~/.ssh/SawBawDevOpsFinalKey
          chmod 600 ~/.ssh/SawBawDevOpsFinalKey
          echo "${{ secrets.STAGE_KEY }}" > ~/.ssh/DevopsFinalStagingKey
          chmod 600 ~/.ssh/DevopsFinalStagingKey

      - name: Run Ansible setup on staging
        run: |
          ansible-playbook \
            -i ansible/inventory.aws_ec2.yml \
            ansible/setup-docker.yml \
            --limit _Staging
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Run Ansible setup on production
        run: |
          ansible-playbook \
            -i ansible/inventory.aws_ec2.yml \
            ansible/setup-docker.yml \
            --limit _Production
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ansible-setup
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-pip
          pipx inject ansible-core boto3 botocore
          ansible-galaxy collection install community.docker amazon.aws

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-2

      - name: Create SSH key for staging
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGE_KEY }}" > ~/.ssh/DevopsFinalStagingKey
          chmod 600 ~/.ssh/DevopsFinalStagingKey

      - name: Deploy to Staging via Ansible
        run: |
          ansible-playbook \
            -i ansible/inventory.aws_ec2.yml \
            ansible/deploy-playbook.yml \
            --limit _Staging \
            -e "web_image=${{ secrets.DOCKER_USERNAME }}/devops-final:sha-${{ github.event.workflow_run.head_sha }}"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Staging summary
        run: echo "Staging deployment complete"

  approval:
    name: Waiting for Approval to deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production-approval

    steps:
      - name: Approved
        run: echo "Approved - deploying to production"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-pip
          pipx inject ansible-core boto3 botocore
          ansible-galaxy collection install community.docker amazon.aws

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-2

      - name: Create SSH key for production
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_KEY }}" > ~/.ssh/SawBawDevOpsFinalKey
          chmod 600 ~/.ssh/SawBawDevOpsFinalKey

      - name: Deploy to Production via Ansible
        run: |
          ansible-playbook \
            -i ansible/inventory.aws_ec2.yml \
            ansible/deploy-playbook.yml \
            --limit _Production \
            -e "web_image=${{ secrets.DOCKER_USERNAME }}/devops-final:sha-${{ github.event.workflow_run.head_sha }}"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Production summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Production deployment complete"
          else
            echo "Production deployment failed"
          fi
