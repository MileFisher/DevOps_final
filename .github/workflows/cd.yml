name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  # ─── STAGING DEPLOY (automatic) ───
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=v-${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/devops-final/staging
            export IMAGE_TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            echo "Pulling image: $DOCKER_USERNAME/devops-final:$IMAGE_TAG"
            docker pull $DOCKER_USERNAME/devops-final:$IMAGE_TAG
            echo "WEB_IMAGE=$DOCKER_USERNAME/devops-final:$IMAGE_TAG" > .env
            docker compose -p staging up -d --no-deps --pull never web
            docker image prune -f
            echo "Waiting for staging app to become healthy..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:3002/ > /dev/null 2>&1; then
                echo "Staging app is up after $((i * 3))s"
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "Staging health check failed"
                exit 1
              fi
              sleep 3
            done

      - name: Staging summary
        run: echo "✅ Staging deployment complete for ${{ steps.tag.outputs.IMAGE_TAG }}"

  # ─── MANUAL APPROVAL GATE ───
  approval:
    name: Waiting for Manual Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production-approval   

    steps:
      - name: Approved
        run: echo "✅ Approved — proceeding to production deployment"

  # ─── PRODUCTION DEPLOY (after approval) ───
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=v-${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/devops-final/production
            export IMAGE_TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            echo "Pulling image: $DOCKER_USERNAME/devops-final:$IMAGE_TAG"
            docker pull $DOCKER_USERNAME/devops-final:$IMAGE_TAG
            echo "WEB_IMAGE=$DOCKER_USERNAME/devops-final:$IMAGE_TAG" > .env
            docker compose -p production up -d --no-deps --pull never web
            docker image prune -f
            echo "Waiting for production app to become healthy..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
                echo "Production app is up after $((i * 3))s"
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "Production health check failed - rolling back"
                exit 1
              fi
              sleep 3
            done

      - name: Production summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Production deployment complete for ${{ steps.tag.outputs.IMAGE_TAG }}"
          else
            echo "❌ Production deployment failed for ${{ steps.tag.outputs.IMAGE_TAG }}"
          fi