- name: Pull and Restart Docker Compose Project
  hosts: aws_ec2
  become: true
  vars:
    project_path: "/home/{{ ansible_user }}/app"
    web_replicas: 2

  tasks:
    - name: Ensure community.docker collection is installed
      delegate_to: localhost
      ansible.builtin.command: ansible-galaxy collection install community.docker
      run_once: true
      become: false

    - name: Copy canonical Docker Compose file
      ansible.builtin.copy:
        src: ../docker-compose.yml
        dest: "{{ project_path }}/compose.yml"
        force: true
        mode: '0644'

    - name: Copy monitoring configuration
      ansible.builtin.copy:
        src: ../monitoring
        dest: "{{ project_path }}/"
        force: true
        mode: preserve

    - name: Write WEB_IMAGE for Docker Compose
      ansible.builtin.copy:
        dest: "{{ project_path }}/.env"
        content: |
          WEB_IMAGE={{ web_image | mandatory }}
          APP_VERSION={{ web_image | mandatory | regex_replace('^.*:', '') }}
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password | mandatory }}
          GF_SERVER_ROOT_URL=https://{{ domain_names[0] }}/grafana/
        mode: '0644'

    - name: Show disk usage before Docker cleanup
      ansible.builtin.command: df -h
      register: disk_before_cleanup
      changed_when: false

    - name: Print disk usage before Docker cleanup
      ansible.builtin.debug:
        var: disk_before_cleanup.stdout_lines

    - name: Show Docker disk usage before cleanup
      ansible.builtin.command: docker system df
      register: docker_disk_before_cleanup
      changed_when: false

    - name: Print Docker disk usage before cleanup
      ansible.builtin.debug:
        var: docker_disk_before_cleanup.stdout_lines

    - name: Remove unused Docker images before deployment
      ansible.builtin.command: docker image prune -af
      register: image_prune_before
      changed_when: "'Total reclaimed space: 0B' not in image_prune_before.stdout"

    - name: Remove unused Docker build cache before deployment
      ansible.builtin.command: docker builder prune -af
      register: builder_prune_before
      changed_when: "'Total reclaimed space: 0B' not in builder_prune_before.stdout"

    - name: Pull versioned image and restart containers
      community.docker.docker_compose_v2:
        project_src: "{{ project_path }}"
        state: present
        pull: always
        recreate: auto
        scale:
          web: "{{ web_replicas | int }}"

    - name: Remove unused Docker images after deployment
      ansible.builtin.command: docker image prune -af
      register: image_prune_after
      changed_when: "'Total reclaimed space: 0B' not in image_prune_after.stdout"

    - name: Show disk usage after deployment
      ansible.builtin.command: df -h
      register: disk_after_deploy
      changed_when: false

    - name: Print disk usage after deployment
      ansible.builtin.debug:
        var: disk_after_deploy.stdout_lines

    - name: Show Docker disk usage after deployment
      ansible.builtin.command: docker system df
      register: docker_disk_after_deploy
      changed_when: false

    - name: Print Docker disk usage after deployment
      ansible.builtin.debug:
        var: docker_disk_after_deploy.stdout_lines
