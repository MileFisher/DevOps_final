- name: Pull and Restart Docker Compose Project
  hosts: aws_ec2
  become: true
  vars:
    project_path: "/home/{{ ansible_user }}/app"
    web_replicas: 2

  tasks:
    - name: Ensure community.docker collection is installed
      delegate_to: localhost
      ansible.builtin.command: ansible-galaxy collection install community.docker
      run_once: true
      become: false

    - name: Copy canonical Docker Compose file
      ansible.builtin.copy:
        src: ../docker-compose.yml
        dest: "{{ project_path }}/compose.yml"
        force: true
        mode: '0644'

    - name: Write WEB_IMAGE for Docker Compose
      ansible.builtin.copy:
        dest: "{{ project_path }}/.env"
        content: |
          WEB_IMAGE={{ web_image | mandatory }}
          APP_VERSION={{ web_image | mandatory | regex_replace('^.*:', '') }}
        mode: '0644'

    - name: Pull versioned image and restart containers
      community.docker.docker_compose_v2:
        project_src: "{{ project_path }}"
        state: present
        pull: always
        recreate: auto
        scale:
          web: "{{ web_replicas | int }}"
