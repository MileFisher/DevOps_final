---
- name: Setup Server
  hosts: all
  become: true

  tasks:
    # ─── 1. Create staging folder ───
    - name: Create staging directory
      file:
        path: /opt/devops-final/staging
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    # ─── 2. Create production folder ───
    - name: Create production directory
      file:
        path: /opt/devops-final/production
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    # ─── 3. Copy staging docker-compose ───
    - name: Copy staging docker-compose
      copy:
        src: ../staging/docker-compose.yml
        dest: /opt/devops-final/staging/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    # ─── 4. Copy production docker-compose ───
    - name: Copy production docker-compose
      copy:
        src: ../production/docker-compose.yml
        dest: /opt/devops-final/production/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    # ─── 5. Configure Nginx for staging ───
    - name: Create nginx config for staging
      copy:
        dest: /etc/nginx/sites-available/staging
        content: |
          server {
            listen 80;
            server_name staging.yourdomain.com;

            location / {
              proxy_pass http://localhost:3002;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
            }
          }

    # ─── 6. Configure Nginx for production ───
    - name: Create nginx config for production
      copy:
        dest: /etc/nginx/sites-available/production
        content: |
          server {
            listen 80;
            server_name aqic.click;

            location / {
              proxy_pass http://localhost:3001;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
            }
          }

    - name: Enable staging site
      file:
        src: /etc/nginx/sites-available/staging
        dest: /etc/nginx/sites-enabled/staging
        state: link

    - name: Enable production site
      file:
        src: /etc/nginx/sites-available/production
        dest: /etc/nginx/sites-enabled/production
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes