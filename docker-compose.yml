services:
  web:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    ports:
      - "3001-3002:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/products_db
      - APP_VERSION=${APP_VERSION:-local}
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - app_network
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mongo:
    image: mongo:6.0
    container_name: final_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - ./dump:/dump
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  uploads_data:
    driver: local
  mongo_data:
    driver: local

networks:
  app_network:
    driver: bridge
